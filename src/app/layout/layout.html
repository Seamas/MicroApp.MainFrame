<nz-layout class="whole-page">
  <nz-sider nzCollapsible [(nzCollapsed)]="isCollapsed">

    <div class="logo">Micro Portal</div>
    <ul nz-menu nzMode="inline" [nzInlineCollapsed]="isCollapsed">
      @for (app of apps; track app.name) {
        <li nz-menu-item (click)="selectApp(app)">
          {{ app.name }}
        </li>
      }
    </ul>
  </nz-sider>

  <nz-layout>
    <nz-header style="background: #fff; padding: 0; display: flex; justify-content: flex-end;">


      <button nz-button (click)="logout()">退出</button>
    </nz-header>
    <nz-content style="margin: 24px; height: calc(100vh - 112px);">

      } -->
