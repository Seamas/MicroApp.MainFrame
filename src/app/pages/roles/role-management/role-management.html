<div class="outer-container">
  <div class="search-bar">
    <!-- 搜索表单项容器 -->
    <form [formGroup]="searchForm" class="search-fields">
      <nz-form-item>
        <nz-form-label nzFor="name">角色名</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="name" placeholder="请输入角色名" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="code">角色编码</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="code" placeholder="请输入角色编辑" />
        </nz-form-control>
      </nz-form-item>

      <!-- 未来可直接在这里加更多 nz-form-item -->
      <div class="search-actions">
        <button nz-button nzType="primary" (click)="loadRoles()" type="button">查询</button>
        <button nz-button nzType="default" type="reset">重置</button>
      </div>
    </form>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button nz-button nzType="primary" (click)="openRoleModal()">
      <i nz-icon nzType="plus"></i> 新增角色
    </button>
  </div>

  <!-- 表格和分页容器 -->
  <div class="table-wrapper">
    <!-- 表格 -->
    <div class="table-container">
      <nz-table
        [nzData]="roles"
        nzBordered
        [nzFrontPagination]="false"
        [nzScroll]="{ y: 'calc(100vh - 380px)' }"
        nzSize="middle"
      >
        <thead>
          <tr>
            <th nzWidth="35%">角色名称</th>
            <th nzWidth="35%">角色编辑</th>
            <th nzWidth="100px">状态</th>
            <th nzWidth="180px" nzAlign="right">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (role of roles; track role.id) {
            <tr>
              <td>{{ role.name }}</td>
              <td>{{ role.code }}</td>
              <td>
                <nz-switch
                  [ngModel]="role.isEnabled"
                  (ngModelChange)="toggleStatus($event, role)"
                  [nzCheckedChildren]="'启用'"
                  [nzUnCheckedChildren]="'禁用'"
                ></nz-switch>
              </td>
              <td>
                <div class="action-buttons">
                  <button nz-button nzSize="small" (click)="openRoleModal(role.id)">编辑</button>
                  <button nz-button nzSize="small" (click)="openRoleUserModal(role)">管理用户</button>
                    <button nz-button nzSize="small" (click)="openRolePermissionModal(role)">
                      管理权限
                    </button>
                  <button nz-button nzDanger nzSize="small" (click)="deleteRole(role)">
                    删除角色
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </nz-table>
    </div>

    <!-- 分页 -->
    <div class="pagination-wrapper">
      <nz-pagination
          [nzPageIndex]="pageIndex"
          [nzPageSize]="pageSize"
        [nzTotal]="total"
        [nzPageSizeOptions]="[10, 20, 50]"
        (nzPageIndexChange)="onPageIndexChanged($event)"
        (nzPageSizeChange)="onPageSizeChanged($event)"
        nzShowSizeChanger
        nzShowQuickJumper
      ></nz-pagination>
    </div>
  </div>
</div>
