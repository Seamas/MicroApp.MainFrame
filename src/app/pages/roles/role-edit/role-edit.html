<form nz-form [formGroup]="form" (ngSubmit)="onSubmit()" class="edit-form">
  <nz-form-item>
    <nz-form-label [nzSpan]="6" nzFor="code" nzRequired>角色编码</nz-form-label>
    <nz-form-control [nzSpan]="14" [nzErrorTip]="getCodeErrorTip()" nzHasFeedback [nzValidateStatus]="codeControl">
      <input nz-input formControlName="code" placeholder="请输入角色编码"/>
      @if(validatingCode) {
        <nz-spin nzSize="small" nzTip="正在校验角色编码"></nz-spin>
      }
      <div class="form-hint">
        只能包含字母、数字、下划线(_)和短横线(-)，2-30个字符
      </div>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label [nzSpan]="6" nzFor="name" nzRequired>角色名称</nz-form-label>
    <nz-form-control [nzSpan]="14" nzErrorTip="请输入角色名称（2-50个字符）">
      <input nz-input formControlName="name" placeholder="请输入角色名称"/>

      <div class="form-hint">2-50个字符</div>
    </nz-form-control>
  </nz-form-item>

  <div class="form-actions">
    <button nz-button type="button" (click)="cancel()">取消</button>
    <button nz-button nzType="primary" [disabled]="form.invalid || form.pending" [nzLoading]="form.pending" type="submit">保存</button>
  </div>
</form>
