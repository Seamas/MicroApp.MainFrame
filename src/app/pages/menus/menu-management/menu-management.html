<div class="outer-container">
  <div class="search-bar">
    <!-- 搜索表单项容器 -->
    <form [formGroup]="searchForm" class="search-fields">
      <nz-form-item>
        <nz-form-label nzFor="name">菜单名</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="name" placeholder="请输入菜单名" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="code">菜单类型</nz-form-label>
        <nz-form-control>
          <nz-select formControlName="code" placeholder="请选择菜单类型" nzAllowClear>
            <nz-option [nzValue]="'router'" nzLabel="本地应用"></nz-option>
            <nz-option [nzValue]="'microapp'" nzLabel="微应用"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="isEnabled">菜单状态</nz-form-label>
        <nz-form-control>
          <nz-select formControlName="isEnabled" placeholder="请选择菜单状态" nzAllowClear>
            <nz-option [nzValue]="true" nzLabel="启用"></nz-option>
            <nz-option [nzValue]="false" nzLabel="禁用"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <!-- 未来可直接在这里加更多 nz-form-item -->
      <div class="search-actions">
        <button nz-button nzType="primary" (click)="loadMenus()" type="button">查询</button>
        <button nz-button nzType="default" type="reset">重置</button>
      </div>
    </form>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button nz-button nzType="primary" (click)="openMenuModal()">
      <i nz-icon nzType="plus"></i> 新增菜单
    </button>
  </div>

  <!-- 表格和分页容器 -->
  <div class="table-wrapper">
    <!-- 表格 -->
    <div class="table-container">
      <nz-table
        [nzData]="menus"
        nzBordered
        [nzFrontPagination]="false"
        [nzScroll]="{ y: 'calc(100vh - 380px)' }"
        nzSize="middle"
      >
        <thead>
          <tr>
            <th nzWidth="25%">菜单名称</th>
            <th nzWidth="25%">菜单类型</th>
            <th nzWidth="50%">菜单路径</th>
            <th nzWidth="100px">状态</th>
            <th nzWidth="180px" nzAlign="right">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (menu of menus; track menu.id) {
            <tr>
              <td>{{ menu.name }}</td>
              <td>{{ getCodeMap(menu.code) }}</td>
              <td>{{ menu.path }}</td>
              <td>
                <nz-switch
                  [ngModel]="menu.isEnabled"
                  (ngModelChange)="toggleStatus($event, menu)"
                  [nzCheckedChildren]="'启用'"
                  [nzUnCheckedChildren]="'禁用'"
                ></nz-switch>
              </td>
              <td>
                <div class="action-buttons">
                  <button nz-button nzSize="small" (click)="openMenuModal(menu.id)">编辑</button>
                  <button nz-button nzDanger nzSize="small" (click)="deleteMenu(menu)">
                    删除
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </nz-table>
    </div>

    <!-- 分页 -->
    <div class="pagination-wrapper">
      <nz-pagination
        [nzPageIndex]="pageIndex"
        [nzPageSize]="pageSize"
        [nzTotal]="total"
        [nzPageSizeOptions]="[10, 20, 50]"
        (nzPageIndexChange)="onPageIndexChanged($event)"
        (nzPageSizeChange)="onPageSizeChanged($event)"
        nzShowSizeChanger
        nzShowQuickJumper
      ></nz-pagination>
    </div>
  </div>
</div>
