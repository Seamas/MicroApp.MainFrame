<div class="register-container">
  <div class="register-form">
    <h2>用户注册</h2>

    @if (errorMessage) {
      <nz-alert nzType="error" [nzMessage]="errorMessage" nzShowIcon></nz-alert>
    }

    <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
      <nz-form-item>
        <nz-form-control [nzErrorTip]="getUsernameErrorTip()" nzHasFeedback [nzValidateStatus]="usernameControl">
            <input nz-icon="user" formControlName="username" nz-input placeholder="用户名" />
            @if(validatingUsername) {
              <nz-spin nzSize="small" nzTip="正在校验用户名"></nz-spin>
            }
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="请输入昵称">
            <input nz-icon="man" formControlName="nickname" nz-input placeholder="昵称" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="请输入电子邮箱地址">
            <input nz-icon="mail" formControlName="email" nz-input placeholder="电子邮箱" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="请输入至少6位密码">
            <input nz-icon="lock" formControlName="password" nz-input type="password" placeholder="密码" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control
          nzErrorTip="两次输入的密码不一致"
          [nzValidateStatus]="validateForm.hasError('mismatch') ? 'error' : ''"
        >
            <input
            nz-icon="lock"
              formControlName="confirmPassword"
              nz-input
              type="password"
              placeholder="确认密码"
            />
        </nz-form-control>
      </nz-form-item>

      <button
        nz-button
        nzType="primary"
        [disabled]="!validateForm.valid"
        class="register-button"
        type="submit"
      >
        注册
      </button>

      <div class="footer">已有账号？<a (click)="goToLogin()">立即登录</a></div>
    </form>
  </div>
</div>
