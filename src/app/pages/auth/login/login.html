<div class="login-container">
  <div class="login-form">
    <h2>用户登录</h2>

    @if (errorMessage) {
      <nz-alert nzType="error" [nzMessage]="errorMessage" nzShowIcon></nz-alert>
    }

    <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
      <nz-form-item>
        <nz-form-control nzErrorTip="请输入至少3位用户名">
          <nz-input-group nzPrefixIcon="user">
            <input formControlName="username" nz-input placeholder="用户名" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="请输入至少6位密码">
          <nz-input-group nzPrefixIcon="lock">
            <input formControlName="password" nz-input type="password" placeholder="密码" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <button
        nz-button
        nzType="primary"
        [disabled]="!validateForm.valid"
        style="width: 100%; margin-top: 24px"
      >
        登录
      </button>

      <div class="footer">还没有账号？<a (click)="goToRegister()">立即注册</a></div>
    </form>
  </div>
</div>
