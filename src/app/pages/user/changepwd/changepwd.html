
@if (errorMessage) {
        <nz-alert nzType="error" [nzMessage]="errorMessage" nzShowIcon></nz-alert>

}
<nz-card nzTitle="修改密码" nzBordered>
  <form nz-form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <nz-form-item>
      <nz-form-label [nzSpan]="6" nzFor="oldPassword" nzRequired>当前密码</nz-form-label>
      <nz-form-control [nzSpan]="14" nzErrorTip="请输入当前密码">
        <input nz-input type="password" formControlName="oldPassword" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label [nzSpan]="6" nzFor="newPassword" nzRequired>新密码</nz-form-label>
      <nz-form-control [nzSpan]="14" nzErrorTip="密码长度至少6位">
        <input nz-input type="password" formControlName="newPassword" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label [nzSpan]="6" nzFor="confirmPassword" nzRequired>确认新密码</nz-form-label>
      <nz-form-control 
        [nzSpan]="14" 
        nzErrorTip="两次输入的密码不一致"
        [nzValidateStatus]="passwordForm.hasError('mismatch') ? 'error': ''"
        >
        <input nz-input type="password" formControlName="confirmPassword" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control>
        <button nz-button nzType="primary" [nzLoading]="loading" [disabled]="passwordForm.invalid || passwordMismatch">
          修改密码
        </button>
      </nz-form-control>
    </nz-form-item>
  </form>
</nz-card>
