<div class="outer-container">
  <div class="search-bar">
    <!-- 搜索表单项容器 -->
    <form [formGroup]="searchForm" class="search-fields">
      <nz-form-item>
        <nz-form-label nzFor="url">接口地址</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="url" placeholder="请输入接口地址" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="apiGroup">接口分组</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="apiGroup" placeholder="请输入接口分组" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="description">接口描述</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="description" placeholder="请输入接口描述" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="isEnabled">启用状态</nz-form-label>
        <nz-form-control>
          <nz-select formControlName="isEnabled" placeholder="请选择接口状态" nzAllowClear>
            <nz-option [nzValue]="true" nzLabel="启用"></nz-option>
            <nz-option [nzValue]="false" nzLabel="禁用"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <!-- 未来可直接在这里加更多 nz-form-item -->
      <div class="search-actions">
        <button nz-button nzType="primary" (click)="loadData()" type="button">查询</button>
        <button nz-button nzType="default" type="reset">重置</button>
      </div>
    </form>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button nz-button nzType="primary" (click)="openApiEndpointModal()">
      <i nz-icon nzType="plus"></i> 新增API端点
    </button>

    <button nz-button nzDanger (click)="initApiEndpoints()">
      <i nz-icon nzType="sync"></i> 初始化API端点
      </button>
  </div>

  <!-- 表格和分页容器 -->
  <div class="table-wrapper">
    <!-- 表格 -->
    <div class="table-container">
      <nz-table
        [nzData]="dataItems"
        nzBordered
        [nzFrontPagination]="false"
        [nzScroll]="{ y: 'calc(100vh - 380px)' }"
        nzSize="middle"
      >
        <thead>
          <tr>
            <th nzWidth="25%">端点地址</th>
            <th nzWidth="25%">接口分组</th>
            <th nzWidth="50%">接口描述</th>
            <th nzWidth="100px">状态</th>
            <th nzWidth="180px" nzAlign="right">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (data of dataItems; track data.id) {
            <tr>
              <td>{{ data.url }}</td>
              <td>{{ data.apiGroup }}</td>
              <td>{{ data.description }}</td>
              <td>
                <nz-switch
                  [ngModel]="data.isEnabled"
                  (ngModelChange)="toggleStatus($event, data)"
                  [nzCheckedChildren]="'启用'"
                  [nzUnCheckedChildren]="'禁用'"
                ></nz-switch>
              </td>
              <td>
                <div class="action-buttons">
                  <button nz-button nzSize="small" (click)="openApiEndpointModal(data.id)">编辑</button>
                  <button nz-button nzDanger nzSize="small" (click)="deleteApiEndpoint(data)">
                    删除
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </nz-table>
    </div>

    <!-- 分页 -->
    <div class="pagination-wrapper">
      
      <nz-pagination
        [nzPageIndex]="pageIndex"
        [nzPageSize]="pageSize"
        [nzTotal]="total"
        [nzShowTotal]="rangeTemplate"
        [nzPageSizeOptions]="[10, 20, 50]"
        (nzPageIndexChange)="onPageIndexChanged($event)"
        (nzPageSizeChange)="onPageSizeChanged($event)"
        nzShowSizeChanger
        nzShowQuickJumper
      ></nz-pagination>
      <ng-template #rangeTemplate let-range="range" let-total>
      当前 {{ range[0] }}-{{ range[1] }} 共 {{ total }} 条数据
    </ng-template>
    </div>
  </div>
</div>
