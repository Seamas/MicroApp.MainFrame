<form nz-form [formGroup]="form" (ngSubmit)="onSubmit()" class="edit-form">

    <nz-form-item>
    <nz-form-label [nzSpan]="6" nzFor="url" nzRequired>接口地址</nz-form-label>
    <nz-form-control [nzSpan]="14" [nzErrorTip]="urlErrorTip()">
      <input nz-input formControlName="url" placeholder="请输入接口地址"/>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
        <nz-form-label [nzSpan]="6" nzFor="apiGroup" nzRequired>接口分组</nz-form-label>
        <nz-form-control [nzSpan]="14" >
      <input nz-input formControlName="apiGroup" placeholder="请输入接口分组"/>
    </nz-form-control>
      </nz-form-item>

  <nz-form-item>
    <nz-form-label [nzSpan]="6" nzFor="description">接口描述</nz-form-label>
    <nz-form-control [nzSpan]="14">
      <input nz-input formControlName="description" placeholder="请输入接口描述"/>
    </nz-form-control>
  </nz-form-item>


  <nz-form-item>
        <nz-form-label [nzSpan]="6" nzFor="isEnabled" nzRequired>接口状态</nz-form-label>
        <nz-form-control [nzSpan]="14">
          <nz-select formControlName="isEnabled" placeholder="请选择接口状态">
            <nz-option [nzValue]="true" nzLabel="启用"></nz-option>
            <nz-option [nzValue]="false" nzLabel="禁用"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>

  <div class="form-actions">
    <button nz-button type="button" (click)="cancel()">取消</button>
    <button nz-button nzType="primary" [disabled]="form.invalid || form.pending" [nzLoading]="form.pending" type="submit">保存</button>
  </div>
</form>
