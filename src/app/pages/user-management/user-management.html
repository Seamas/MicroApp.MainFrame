<!-- src/app/pages/user-management/user-management.component.html -->
<div class="user-management-container">
  <div class="search-bar">
    <!-- 搜索表单项容器 -->
    <div class="search-fields">
      <nz-form-item>
        <nz-form-label>用户名</nz-form-label>
        <nz-form-control>
          <input nz-input placeholder="请输入用户名" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>昵称</nz-form-label>
        <nz-form-control>
          <input nz-input placeholder="请输入昵称" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>邮箱</nz-form-label>
        <nz-form-control>
          <input nz-input placeholder="请输入邮箱" />
        </nz-form-control>
      </nz-form-item>

      <!-- 未来可直接在这里加更多 nz-form-item -->
      <div class="search-actions">
        <button nz-button nzType="primary">查询</button>
        <button nz-button nzType="default">重置</button>
      </div>
    </div>

    <!-- 操作按钮（靠右） -->
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button nz-button nzType="primary" (click)="openUserModal()">
      <i nz-icon nzType="plus"></i> 新增用户
    </button>
  </div>

  <div class="table-container">
    <!-- 表格 -->
    <nz-table [nzData]="users" nzBordered [nzFrontPagination]="false">
      <thead>
        <tr>
          <th>用户名</th>
          <th>昵称</th>
          <th>邮箱</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.id) {
          <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.nickname }}</td>
            <td>{{ user.email }}</td>
            <td>
              <nz-switch
                [ngModel]="user.isEnabled"
                (ngModelChange)="toggleStatus(user)"
                [nzCheckedChildren]="'启用'"
                [nzUnCheckedChildren]="'禁用'"
              ></nz-switch>
            </td>
            <td>
              <button nz-button nzSize="small" (click)="openUserModal(user)">编辑</button>
              <button nz-button nzDanger nzSize="small" (click)="resetPassword(user)">
                重置密码
              </button>
            </td>
          </tr>
        }
      </tbody>
    </nz-table>
  </div>

  <!-- 分页 -->
  <div class="pagination-wrapper">
    <nz-pagination
      [nzPageIndex]="pageIndex"
      [nzPageSize]="pageSize"
      [nzTotal]="500"
      nzShowQuickJumper
    ></nz-pagination>
  </div>
</div>
