<div class="outer-container">
  <div class="search-bar">
    <!-- 搜索表单项容器 -->
    <form [formGroup]="searchForm" class="search-fields">
      <nz-form-item>
        <nz-form-label nzFor="username">用户名</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="username" placeholder="请输入用户名" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="nickname">昵称</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="nickname" placeholder="请输入昵称" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="email">邮箱</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="email" placeholder="请输入邮箱" />
        </nz-form-control>
      </nz-form-item>

      <!-- 未来可直接在这里加更多 nz-form-item -->
      <div class="search-actions">
        <button nz-button nzType="primary" (click)="loadUsers()">查询</button>
        <button nz-button nzType="default" type="reset">重置</button>
      </div>
    </form>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button nz-button nzType="primary" (click)="openUserModal()">
      <i nz-icon nzType="plus"></i> 新增用户
    </button>
  </div>

  <!-- 表格和分页容器 -->
  <div class="table-wrapper">
    <!-- 表格 -->
    <div class="table-container">
      <nz-table
        [nzData]="users"
        nzBordered
        [nzFrontPagination]="false"
        [nzScroll]="{ y: 'calc(100vh - 380px)' }"
        nzSize="middle"
      >
        <thead>
          <tr>
            <th nzWidth="25%">用户名</th>
            <th nzWidth="25%">昵称</th>
            <th nzWidth="50%">邮箱</th>
            <th nzWidth="100px">状态</th>
            <th nzWidth="180px" nzAlign="right">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users; track user.id) {
            <tr>
              <td>{{ user.username }}</td>
              <td>{{ user.nickname }}</td>
              <td>{{ user.email }}</td>
              <td>
                <nz-switch
                  [ngModel]="user.isEnabled"
                  (ngModelChange)="toggleStatus($event, user)"
                  [nzCheckedChildren]="'启用'"
                  [nzUnCheckedChildren]="'禁用'"
                ></nz-switch>
              </td>
              <td>
                <div class="action-buttons">
                  <button nz-button nzSize="small" (click)="openUserModal(user.id)">编辑</button>
                  <button nz-button nzDanger nzSize="small" (click)="resetPassword(user)">
                    重置密码
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </nz-table>
    </div>

    <!-- 分页 -->
    <div class="pagination-wrapper">
      <nz-pagination
        [nzPageIndex]="pageIndex"
        [nzPageSize]="pageSize"
        [nzTotal]="total"
        [nzPageSizeOptions]="[10, 20, 50]"
        (nzPageIndexChange)="onPageIndexChanged($event)"
        (nzPageSizeChange)="onPageSizeChanged($event)"
        nzShowSizeChanger
        nzShowQuickJumper
      ></nz-pagination>
    </div>
  </div>
</div>
